name: Fetch listings daily

on:
  schedule:
    # Every day at 06:00 UTC (08:00 Warsaw time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch listings (Otodom + Gratka)
        run: python fetch_listings.py --max-pages 5 --no-geocode

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings_raw.json
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: update listings $(date -u +'%Y-%m-%d %H:%M')"
          git push
